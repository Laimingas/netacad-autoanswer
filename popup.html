<!DOCTYPE html>
<html>
<head>
  <title>NetAcad Scraper Control</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 10px;
      background-color: #f4f7f6;
    }
    h3 {
      color: #0056b3;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 10px;
      color: #333;
    }
    input[type="text"], input[type="password"] {
      width: calc(100% - 22px);
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #007bff;
      color: white;
      padding: 10px 15px;
      margin-top: 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 15px;
    }
    button:hover { background-color: #0056b3; }
    #status {
      margin-top: 10px;
      text-align: center;
      font-size: 0.9em;
      color: #555;
    }
    .mode {
      margin-top: 12px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }
    .mode-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }
  </style>
</head>
<body>
<h3>NetAcad Assistant</h3>

<div class="mode">
  <div><strong>Answer source</strong></div>

  <label class="mode-row">
    <input type="radio" name="answerMode" value="auto" checked />
    Auto (bank with AI fallback)
  </label>

  <label class="mode-row">
    <input type="radio" name="answerMode" value="bank" />
    Question bank only
  </label>

  <label class="mode-row">
    <input type="radio" name="answerMode" value="ai" />
    AI only
  </label>
</div>

<label for="apiKey">OpenAI API Key:</label>
<input type="password" id="apiKey" placeholder="Enter your OpenAI API Key" />
<button id="saveKey">Save settings</button>

<div id="status"></div>
<small>You can press Alt+M to process questions on the current page.</small>

<script src="popup.js"></script>
</body>
</html>
